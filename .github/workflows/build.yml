name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate wrapper
        run: |
          gradle wrapper --gradle-version=8.2 --distribution-type=bin
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug 2>&1 | tee build.log; grep "^e:" build.log || true; exit ${PIPESTATUS[0]}

      - name: Find APK
        if: success()
        run: find . -name "*.apk" -type f

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-debug
          path: "**/*.apk"
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
