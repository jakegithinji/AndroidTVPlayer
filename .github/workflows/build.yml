name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download correct gradle wrapper jar
        run: |
          curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
PROPS
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug 2>&1 | tee build.log; grep "^e:" build.log || true; exit ${PIPESTATUS[0]}

      - name: Find APK
        if: success()
        run: find . -name "*.apk" -type f

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-debug
          path: "**/*.apk"
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
